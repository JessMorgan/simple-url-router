<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}URL Redirector{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 640px; margin: 3rem auto; padding: 0 1rem;
            line-height: 1.6; color: #1a1a1a; background: #fafafa;
        }
        h1 { font-size: 1.5rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 0.5rem; }
        a { color: #2563eb; }
        a:hover { color: #1d4ed8; }
        .flash { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 0.75rem 1rem; border-radius: 6px; margin: 1rem 0; }
        .flash.error { background: #fef2f2; border-color: #fecaca; }
        label { display: block; font-weight: 600; margin: 1rem 0 0.25rem; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 1rem; font-family: monospace;
        }
        button, .btn {
            display: inline-block; padding: 0.5rem 1.25rem; border: none; border-radius: 6px;
            font-size: 0.9rem; cursor: pointer; text-decoration: none;
        }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #e5e7eb; }
        th { font-weight: 600; background: #f9fafb; }
        .meta { color: #6b7280; font-size: 0.85rem; }
        nav { margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/admin">Admin</a>
        <a href="/logout">Logout</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
